name: Weekly Adaptive Model Retraining

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy pandas scikit-learn imbalanced-learn joblib

      - name: Run adaptive check
        run: |
          python src/adaptive_learner.py
        continue-on-error: true

      - name: Commit retraining log if changed
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add reports/retraining_log.json || true
          git diff --staged --quiet || git commit -m "Weekly adaptive check log $(date +'%Y-%m-%d')"
          git push || true